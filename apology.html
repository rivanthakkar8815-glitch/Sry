<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Divuu ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}
.container{
  background:white;
  padding:40px;
  border-radius:25px;
  max-width:650px;
  width:90%;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  z-index:2;
}
h1{color:#ff4d6d;margin-bottom:20px;}
#message{
  font-size:22px;
  color:#444;
  line-height:1.6;
  min-height:140px;
}
.heart{
  position:absolute;
  bottom:-50px;
  animation:float 6s linear forwards;
}
@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}
</style>
</head>
<body>

<div class="container">
  <h1>💖 Thank You Divuu 💖</h1>
  <div id="message"></div>
</div>

<script>
const messages = [
  "🥹 I know I made mistakes and I am truly sorry.",
  "💔 I never wanted to hurt your feelings.",
  "🌹 You mean a lot to me.",
  "✨ Every moment spent with you is special.",
  "🙏 Please accept my sincere apology.",
  "❤️ Thank you for giving me a chance to make things right.",
  "🥰 I promise to learn from my mistakes.",
  "💞 Your smile means the world to me.",
  "🌷 Thank you for hearing my heart.",
  "💖 No matter what happens, I will always respect and cherish you."
];

let index = 0;
const box = document.getElementById("message");

function showMessages(){
  box.innerHTML = messages[index];
  if(index < messages.length - 1){
    index++;
    setTimeout(showMessages, 3500);
  }
}
showMessages();

function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 25) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 200);
</script>

</body>
</html>
