<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sorry Divuu ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  overflow:hidden;
}
.container{
  background:white;
  padding:40px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  max-width:500px;
  z-index:10;
}
h1{color:#ff4d6d;margin-bottom:15px;}
p{color:#555;font-size:18px;margin-bottom:20px;}
h2{color:#ff4d6d;margin-bottom:20px;}
button{
  padding:12px 25px;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  margin:10px;
  transition:0.3s;
}
button:hover{transform:scale(1.1);}
.yes{background:#ff4d6d;color:white;}
.no{background:#ddd;}
.heart{
  position:absolute;
  bottom:-50px;
  animation:float 6s linear forwards;
}
@keyframes float{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-120vh);opacity:0;}
}
</style>
</head>
<body>

<div class="container">
  <h1>💖 Sorry Divuu 💖</h1>
  <p>No matter what happened,<br>you are always special to me ❤️</p>
  <h2>🥺 Will You Forgive Me? 🥺</h2>

  <button class="yes" onclick="window.location.href='apology.html'">Yes ❤️</button>
  <button class="no" id="noBtn">No 😒</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

function moveButton(){
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 60);
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 30) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 200);
</script>

</body>
</html>
